---
project: local_repo
project_description: >
  # Проект: №1
  Добро пожаловать в ваш новый проект Feast.
  В этом пользовательском интерфейсе вы можете увидеть источники данных,
  сущности, объекты, представления объектов и сервисы объектов,
  зарегистрированные в Feast. Похоже, что в этом проекте уже
  зарегистрированы некоторые объекты. Если вы новичок в этом проекте,
  мы рекомендуем начать с ознакомления с функциональными сервисами,
  поскольку они представляют собой набор представлений функций,
  обслуживающих определенную модель. Примечание: Мы рекомендуем вам
  заменить это приветственное сообщение более подходящим контентом
  для вашей команды. Вы можете сделать это, указав project_description
  в вашем feature_store.файл yaml.
registry: data/registry.db
provider: local
online_store:
    type: sqlite
    path: data/online_store.db
entity_key_serialization_version: 3
auth:
    type: no_auth
